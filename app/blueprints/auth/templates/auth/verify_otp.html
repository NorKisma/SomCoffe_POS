<!DOCTYPE html>
<html lang="so">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaqiiji OTP - {{ sys_name if sys_name else 'Rays POS' }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_verify.css') }}">

</head>

<body>
    <div class="auth-card animate__animated animate__zoomIn">
        <div class="text-center mb-5">
            <h2 class="fw-800">Xaqiiji OTPka</h2>
            <p class="text-muted">Gali 6-da god ee laguu soo diray Gmail-kaaga</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            class="alert alert-{{ category }} border-0 bg-{{ category }} bg-opacity-10 text-{{ category }} rounded-4 p-3 mb-4">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.verify_otp') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="otp" class="otp-input" maxlength="6" placeholder="000000" required autofocus>

            <button type="submit" class="btn-login">
                XAQIIJI <i class="fas fa-check-circle ms-2"></i>
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small">Maysan ku soo gaarin OTP-ga?
                <a href="{{ url_for('auth.forgot_password') }}" class="text-primary text-decoration-none fw-bold">Dib u
                    soo dir</a>
            </p>
        </div>
    </div>
</body>

</html>
