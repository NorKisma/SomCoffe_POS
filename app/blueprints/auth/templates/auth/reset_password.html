<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beddel Furaha - {{ sys_name if sys_name else 'Rays POS' }}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_reset.css') }}">
    
</head>
<body>
    <div class="auth-card animate__animated animate__fadeInUp">
        <div class="text-center mb-5">
            <h2 class="fw-800">Beddel Furaha</h2>
            <p class="text-muted">Gasho furahaaga cusub si aad u gasho nidaamka</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} border-0 bg-{{ category }} bg-opacity-10 text-{{ category }} rounded-4 p-3 mb-4">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.reset_password') }}" method="POST">
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase ms-1">FURAHA CUSUB</label>
                <div class="input-wrapper position-relative">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" class="form-control-premium" placeholder="••••••••" required autofocus>
                </div>
            </div>

            <div class="mb-5">
                <label class="form-label small fw-bold text-muted text-uppercase ms-1">HUJI FURAHA</label>
                <div class="input-wrapper position-relative">
                    <i class="fas fa-lock-open input-icon"></i>
                    <input type="password" name="confirm_password" class="form-control-premium" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                BEDDEL FURAHA <i class="fas fa-save ms-2"></i>
            </button>
        </form>
    </div>
</body>
</html>
