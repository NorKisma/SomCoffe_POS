<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beddelidda Furaha - {{ sys_name if sys_name else 'Rays POS' }}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_forgot.css') }}">
    
</head>
<body>
    <div class="auth-card animate__animated animate__fadeInUp">
        <div class="text-center mb-5">
            <h2 class="fw-800">Ma Ilaaway?</h2>
            <p class="text-muted">Gali Email-kaaga si aan kuugu soo dirno OTP</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-premium {{ 'bg-success bg-opacity-10 text-success border-success' if category == 'success' else '' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.forgot_password') }}" method="POST">
            <div class="mb-4 position-relative">
                <label class="form-label small fw-bold text-muted text-uppercase ms-1">Email Address</label>
                <div class="position-relative">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" class="form-control-premium" placeholder="nor@example.com" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                SOO DIR OTP <i class="fas fa-paper-plane ms-2"></i>
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('auth.login') }}" class="text-muted small text-decoration-none fw-bold">Dib oogu laabo Loginka</a>
        </div>
    </div>
</body>
</html>
